{{- if .Values.cups.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bip.fullname" . }}-cups
  labels:
    {{- include "bip.labels" . | nindent 4 }}
    app.kubernetes.io/component: cups
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "bip.fullname" . }}-cups
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "bip.fullname" . }}-cups
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: cups
    spec:
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: cups
          image: {{ .Values.cups.image }}
          env:
            - name: ADMIN_PASSWORD
              value: {{ .Values.cups.adminPassword | quote }}
          ports:
            - name: ipp
              containerPort: 631
          volumeMounts:
            - name: cups-data
              mountPath: /etc/cups
      volumes:
        - name: cups-data
          persistentVolumeClaim:
            claimName: {{ include "bip.fullname" . }}-cups-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bip.fullname" . }}-cups
  labels:
    {{- include "bip.labels" . | nindent 4 }}
    app.kubernetes.io/component: cups
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "bip.fullname" . }}-cups
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: ipp
      port: 631
      targetPort: 631
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bip.fullname" . }}-cups-data
  labels:
    {{- include "bip.labels" . | nindent 4 }}
    app.kubernetes.io/component: cups
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.cups.persistence.size }}
{{- end }}
