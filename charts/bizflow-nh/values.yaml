# ============================================================
# BizFlow NH — Helm values
# ============================================================

image:
  registry: bizcode.azurecr.io
  api: bizflownh-api
  dashboard: bizflownh-dashboard
  pdfSidecar: bizflownh-pdf-sidecar
  landing: bizflownh-landing
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: acr-secret

# ── KSeF ──
ksef:
  # test | demo | prod
  environment: test
  baseUrl: https://ksef-test.mf.gov.pl

# ── JWT ──
jwt:
  key: ""  # Required — generate with: openssl rand -base64 48

# ── OpenBao (Secrets Management) ──
openbao:
  enabled: true
  image: openbao/openbao:2.5.0
  devMode: true
  token: dev-only-token
  persistence:
    size: 1Gi

# ── MinIO (Object Storage) ──
minio:
  enabled: true
  image: minio/minio:latest
  accessKey: ""  # Generated if empty
  secretKey: ""  # Generated if empty
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── PDF Sidecar ──
pdfSidecar:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── API ──
api:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ── Dashboard ──
dashboard:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Landing ──
landing:
  dashboardUrl: "https://app.example.com"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ── Ingress ──
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    landing: bizflow.example.com
    dashboard: app.bizflow.example.com
    api: api.bizflow.example.com
  tls:
    enabled: true
    secretName: bizflow-nh-tls

# ── Timezone ──
timezone: Europe/Warsaw

# ── Node tolerations ──
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

# ── Monitoring ──
monitoring:
  enabled: true
  otelCollector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  prometheus:
    image: prom/prometheus:v2.51.0
    retention: 30d
    persistence:
      size: 10Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  tempo:
    image: grafana/tempo:2.4.1
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  grafana:
    image: grafana/grafana:10.4.1
    adminPassword: admin
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

# ── DB Backup ──
backup:
  enabled: true
  schedule: "0 3 * * *"
  retention: 7
  persistence:
    size: 10Gi

# ── Redis (Bitnami subchart) ──
redis:
  enabled: true
  auth:
    password: ""  # Generated if empty
  architecture: standalone
  master:
    persistence:
      size: 2Gi

# ── RabbitMQ (Bitnami subchart) ──
rabbitmq:
  enabled: true
  auth:
    username: bizflownh
    password: ""  # Generated if empty
  persistence:
    size: 2Gi

# ── PostgreSQL (Bitnami subchart) ──
postgresql:
  enabled: true
  auth:
    username: bizflownh
    password: ""  # Generated if empty
    database: bizflownh
  primary:
    persistence:
      size: 10Gi
