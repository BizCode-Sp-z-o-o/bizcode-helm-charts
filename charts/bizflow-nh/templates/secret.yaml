apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-secrets
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-key: {{ .Values.jwt.key | default (randAlphaNum 48) | quote }}
  postgres-password: {{ .Values.postgresql.auth.password | default (randAlphaNum 24) | quote }}
  rabbitmq-password: {{ .Values.rabbitmq.auth.password | default (randAlphaNum 24) | quote }}
  openbao-token: {{ .Values.openbao.token | default "dev-only-token" | quote }}
  minio-access-key: {{ .Values.minio.accessKey | default (randAlphaNum 16) | quote }}
  minio-secret-key: {{ .Values.minio.secretKey | default (randAlphaNum 32) | quote }}
