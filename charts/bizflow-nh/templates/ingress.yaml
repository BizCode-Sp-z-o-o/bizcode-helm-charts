{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bizflow-nh.fullname" . }}
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.landing }}
        - {{ .Values.ingress.hosts.dashboard }}
        - {{ .Values.ingress.hosts.api }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    # ── Landing ──
    - host: {{ .Values.ingress.hosts.landing }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bizflow-nh.fullname" . }}-landing
                port:
                  number: 4321
    # ── Dashboard + Grafana ──
    - host: {{ .Values.ingress.hosts.dashboard }}
      http:
        paths:
          {{- if .Values.monitoring.enabled }}
          - path: /monitoring/grafana
            pathType: Prefix
            backend:
              service:
                name: {{ include "bizflow-nh.fullname" . }}-grafana
                port:
                  number: 3000
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bizflow-nh.fullname" . }}-dashboard
                port:
                  number: 4322
    # ── API ──
    - host: {{ .Values.ingress.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bizflow-nh.fullname" . }}-api
                port:
                  number: 8080
{{- end }}
