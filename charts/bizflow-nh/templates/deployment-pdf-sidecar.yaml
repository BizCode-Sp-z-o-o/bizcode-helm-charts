apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-pdf-sidecar
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: pdf-sidecar
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pdf-sidecar
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "bizflow-nh.tolerations" . | nindent 6 }}
      containers:
        - name: pdf-sidecar
          image: "{{ .Values.image.registry }}/{{ .Values.image.pdfSidecar }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3100
          {{- with .Values.pdfSidecar.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3100
            periodSeconds: 30
