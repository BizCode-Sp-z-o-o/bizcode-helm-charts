{{- if .Values.openbao.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-openbao
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
    app.kubernetes.io/component: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: openbao
    spec:
      {{- include "bizflow-nh.tolerations" . | nindent 6 }}
      containers:
        - name: openbao
          image: {{ .Values.openbao.image | quote }}
          command: ["bao", "server", "-dev"]
          env:
            - name: BAO_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "bizflow-nh.fullname" . }}-secrets
                  key: openbao-token
            - name: BAO_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          ports:
            - containerPort: 8200
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-openbao
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: openbao
  ports:
    - port: 8200
      targetPort: 8200
{{- end }}
