{{- if .Values.monitoring.enabled }}
# ── OTel Collector ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-otel-collector
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: otel-collector
    spec:
      {{- include "bizflow-nh.tolerations" . | nindent 6 }}
      containers:
        - name: otel-collector
          image: {{ .Values.monitoring.otelCollector.image | quote }}
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8889
              name: prometheus
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          {{- with .Values.monitoring.otelCollector.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: otel-config
          configMap:
            name: {{ include "bizflow-nh.fullname" . }}-otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-otel-collector
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: otel-collector
  ports:
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http
    - port: 8889
      targetPort: 8889
      name: prometheus
---
# ── Prometheus ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-prometheus
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: prometheus
    spec:
      {{- include "bizflow-nh.tolerations" . | nindent 6 }}
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image | quote }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.monitoring.prometheus.retention }}"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
          {{- with .Values.monitoring.prometheus.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: prometheus-config
          configMap:
            name: {{ include "bizflow-nh.fullname" . }}-prometheus
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: {{ include "bizflow-nh.fullname" . }}-prometheus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-prometheus
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.monitoring.prometheus.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-prometheus
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
# ── Tempo ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-tempo
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: tempo
    spec:
      {{- include "bizflow-nh.tolerations" . | nindent 6 }}
      containers:
        - name: tempo
          image: {{ .Values.monitoring.tempo.image | quote }}
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports:
            - containerPort: 3200
              name: http
            - containerPort: 4317
              name: otlp-grpc
          volumeMounts:
            - name: tempo-config
              mountPath: /etc/tempo
            - name: tempo-data
              mountPath: /var/tempo
          resources:
            requests:
              cpu: {{ .Values.monitoring.tempo.resources.requests.cpu }}
              memory: {{ .Values.monitoring.tempo.resources.requests.memory }}
            limits:
              cpu: {{ .Values.monitoring.tempo.resources.limits.cpu }}
              memory: {{ .Values.monitoring.tempo.resources.limits.memory }}
      volumes:
        - name: tempo-config
          configMap:
            name: {{ include "bizflow-nh.fullname" . }}-tempo
        - name: tempo-data
          persistentVolumeClaim:
            claimName: {{ include "bizflow-nh.fullname" . }}-tempo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-tempo
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.monitoring.tempo.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-tempo
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: tempo
  ports:
    - port: 3200
      targetPort: 3200
      name: http
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
---
# ── Grafana ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-grafana
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: grafana
    spec:
      {{- include "bizflow-nh.tolerations" . | nindent 6 }}
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image | quote }}
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/monitoring/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-data
              mountPath: /var/lib/grafana
          {{- with .Values.monitoring.grafana.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: grafana-datasources
          configMap:
            name: {{ include "bizflow-nh.fullname" . }}-grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: {{ include "bizflow-nh.fullname" . }}-grafana-dashboards
        - name: grafana-data
          persistentVolumeClaim:
            claimName: {{ include "bizflow-nh.fullname" . }}-grafana
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-grafana
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-grafana
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: grafana
  ports:
    - port: 3000
      targetPort: 3000
{{- end }}
