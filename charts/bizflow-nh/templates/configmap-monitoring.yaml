{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-otel-collector
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024

    exporters:
      otlp/tempo:
        endpoint: "{{ include "bizflow-nh.fullname" . }}-tempo:4317"
        tls:
          insecure: true
      prometheus:
        endpoint: "0.0.0.0:8889"

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-prometheus
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "otel-collector"
        static_configs:
          - targets: ["{{ include "bizflow-nh.fullname" . }}-otel-collector:8889"]

      - job_name: "bizflownh-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ include "bizflow-nh.fullname" . }}-api:8080"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-tempo
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    compactor:
      compaction:
        block_retention: 72h
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-grafana-datasources
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "bizflow-nh.fullname" . }}-prometheus:9090
        isDefault: true

      - name: PostgreSQL
        type: postgres
        access: proxy
        url: {{ .Release.Name }}-postgresql:5432
        database: {{ .Values.postgresql.auth.database }}
        user: {{ .Values.postgresql.auth.username }}
        secureJsonData:
          password: "$__file{/run/secrets/postgres-password}"
        jsonData:
          sslmode: disable
          postgresVersion: 1600

      - name: Tempo
        type: tempo
        access: proxy
        url: http://{{ include "bizflow-nh.fullname" . }}-tempo:3200
        jsonData:
          tracesToMetrics:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bizflow-nh.fullname" . }}-grafana-dashboards
  labels:
    {{- include "bizflow-nh.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: true
{{- end }}
